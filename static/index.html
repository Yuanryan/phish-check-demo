<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PhishCheck</title>
<style>
  :root {
    --bg: #f6f8fc;
    --panel: #ffffff;
    --border: #e3e6ea;
    --ink: #202124;
    --muted: #5f6368;
    --blue: #1a73e8;
    --low: #1e8e3e;
    --medium: #f9ab00;
    --high: #d93025;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Google Sans", Roboto, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    display: flex;
    justify-content: center;
    padding: 24px;
  }
  /* Mimics a Gmail right-hand add-on panel */
  .panel {
    width: 420px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 1px 3px rgba(60,64,67,.15), 0 4px 8px rgba(60,64,67,.08);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .panel-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    width: 28px; height: 28px; border-radius: 7px;
    background: linear-gradient(135deg, #1a73e8, #34a0a4);
    display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 15px;
  }
  .panel-head h1 { font-size: 16px; margin: 0; font-weight: 600; flex: 1; }
  .provider-pill {
    font-size: 11px; padding: 3px 9px; border-radius: 999px;
    background: #e8f0fe; color: var(--blue); font-weight: 600;
    text-transform: uppercase; letter-spacing: .03em;
  }
  .body { padding: 16px; }
  label.fld { font-size: 12px; color: var(--muted); font-weight: 600; }
  textarea {
    width: 100%; height: 180px; margin-top: 6px; resize: vertical;
    border: 1px solid var(--border); border-radius: 8px; padding: 10px;
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 12px; color: var(--ink); background: #fbfcfe;
  }
  textarea:focus { outline: none; border-color: var(--blue); }
  .row { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
  button {
    background: var(--blue); color: #fff; border: 0; border-radius: 8px;
    padding: 9px 18px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: .6; cursor: default; }
  .link { font-size: 12px; color: var(--blue); cursor: pointer; text-decoration: none; }
  .sample-select {
    font-size: 12px; color: var(--ink); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 8px; background: var(--panel); cursor: pointer;
    flex: 1; max-width: 200px;
  }
  .sample-select:focus { outline: none; border-color: var(--blue); }
  .spinner {
    width: 16px; height: 16px; border: 2px solid #cfe0fb; border-top-color: var(--blue);
    border-radius: 50%; animation: spin .7s linear infinite; display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results card */
  .result { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 16px; display: none; }
  .gauge-wrap { display: flex; align-items: center; gap: 16px; }
  .gauge {
    width: 92px; height: 92px; border-radius: 50%;
    display: grid; place-items: center; flex: none;
  }
  .gauge .inner {
    width: 70px; height: 70px; border-radius: 50%; background: var(--panel);
    display: grid; place-items: center; flex-direction: column;
  }
  .gauge .score { font-size: 26px; font-weight: 700; line-height: 1; }
  .gauge .of { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .verdict-meta { flex: 1; }
  .level-banner {
    font-size: 20px; font-weight: 800; letter-spacing: .01em;
    margin-bottom: 6px; line-height: 1.2;
  }
  .badge {
    display: inline-block; padding: 4px 11px; border-radius: 999px;
    font-size: 12px; font-weight: 700; color: #fff;
  }
  .summary { margin-top: 8px; font-size: 13px; color: var(--ink); line-height: 1.4; }

  .reasons { margin-top: 16px; }
  .reasons h3 { font-size: 12px; color: var(--muted); margin: 0 0 8px; text-transform: uppercase; letter-spacing: .04em; }
  .reason { display: flex; gap: 9px; padding: 9px 0; border-bottom: 1px solid #f1f3f4; }
  .dot { width: 9px; height: 9px; border-radius: 50%; margin-top: 5px; flex: none; }
  .reason .txt { flex: 1; }
  .reason .label { font-size: 13px; font-weight: 600; }
  .reason .detail { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
  .src-tag {
    font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: .04em; align-self: flex-start; margin-top: 3px;
  }
  .src-rule { background: #e6f4ea; color: var(--low); }
  .src-llm { background: #fce8e6; color: #c5221f; }
  .footer { margin-top: 14px; font-size: 11px; color: var(--muted); line-height: 1.5; }
  .footer code { background: #f1f3f4; padding: 1px 5px; border-radius: 4px; }
  .warn { color: var(--high); }
</style>
</head>
<body>
<div class="panel">
  <div class="panel-head">
    <div class="logo">P</div>
    <h1>PhishCheck</h1>
    <span class="provider-pill" id="providerPill">—</span>
  </div>
  <div class="body">
    <label class="fld" for="email">Paste a suspicious email (headers + body)</label>
    <textarea id="email" placeholder="From: ...&#10;Reply-To: ...&#10;Subject: ...&#10;&#10;Message body..."></textarea>
    <div class="row">
      <button id="checkBtn">Check</button>
      <div class="spinner" id="spinner"></div>
      <select class="sample-select" id="sampleSelect">
        <option value="">— 載入範例 —</option>
        <option value="bec">BEC 匯款詐騙</option>
        <option value="cred">憑證竊取（密碼過期）</option>
        <option value="paypal">品牌偽裝（PayPal）</option>
        <option value="lookalike">仿冒域名（m1cr0soft）</option>
        <option value="cfo">CFO 禮品卡詐騙</option>
        <option value="shortener">短網址釣魚（Dropbox）</option>
        <option value="benign">正常商業信件</option>
        <option value="spam">高風險 TLD 促銷信</option>
      </select>
    </div>

    <div class="result" id="result">
      <div class="gauge-wrap">
        <div class="gauge" id="gauge">
          <div class="inner">
            <div class="score" id="score">0</div>
            <div class="of">/ 100</div>
          </div>
        </div>
        <div class="verdict-meta">
          <div class="level-banner" id="levelBanner"></div>
          <span class="badge" id="riskBadge">—</span>
          <div class="summary" id="summary"></div>
        </div>
      </div>

      <div class="reasons">
        <h3>Why</h3>
        <div id="reasonList"></div>
      </div>

      <div class="footer" id="footer"></div>
    </div>
  </div>
</div>

<script>
const COLORS = { low: "#1e8e3e", medium: "#f9ab00", high: "#d93025" };

const SAMPLES = {
  bec: `From: "CEO David Lin" <david.lin@ecloud-valley.co>
Reply-To: payments@secure-transfers.xyz
Return-Path: <bounce@secure-transfers.xyz>
To: finance@ecloudvalley.com
Subject: URGENT wire transfer needed before 3pm
Authentication-Results: mx.google.com; spf=fail smtp.mailfrom=secure-transfers.xyz; dkim=none; dmarc=fail

Hi,

I'm in a confidential meeting and need you to process an urgent wire transfer
immediately. Please change the bank details for vendor payment to the account
below and confirm once done. Do not call me, just handle it.

Account: 8829301 / Routing: 552113

Thanks,
David`,

  cred: `From: "Microsoft 365" <no-reply@m365-account-verify.top>
Reply-To: no-reply@m365-account-verify.top
To: user@ecloudvalley.com
Subject: Your password will expire today - action required
Authentication-Results: mx.google.com; spf=softfail; dkim=none; dmarc=none

Dear user,

We detected unusual activity on your account. Your password will expire today.
To keep your account active, please verify your identity and reset your password
immediately:

<a href="http://203.0.113.44/login/office">https://login.microsoftonline.com</a>

Failure to act will result in your account being suspended.

Microsoft 365 Security Team`,

  paypal: `From: "PayPal Security Center" <security@paypals-support.cf>
Reply-To: security@paypals-support.cf
Return-Path: <bounce@paypals-support.cf>
To: user@ecloudvalley.com
Subject: Your PayPal account has been limited - verify now
Content-Type: text/html
Authentication-Results: mx.google.com; spf=fail smtp.mailfrom=paypals-support.cf; dkim=none; dmarc=fail

<html><body>
<p>Dear PayPal Customer,</p>
<p>We have noticed suspicious activity on your account and have temporarily limited your access.
To restore full access, please verify your identity by clicking the button below immediately.</p>
<p><a href="http://198.51.100.77/paypal/verify">www.paypal.com/verify-identity</a></p>
<p>If you do not verify within 24 hours, your account will be permanently suspended.</p>
<p>— PayPal Security Team</p>
</body></html>`,

  lookalike: `From: "Microsoft Account Team" <no-reply@m1cr0soft.com>
Reply-To: no-reply@m1cr0soft.com
To: employee@ecloudvalley.com
Subject: Action required: reset your password immediately
Authentication-Results: mx.google.com; spf=pass smtp.mailfrom=m1cr0soft.com; dkim=pass; dmarc=pass

Dear Microsoft user,

Unusual sign-in activity was detected on your Microsoft account.
To protect your account, you must verify your identity and reset your password immediately.

Please sign in to https://m1cr0soft.com/account/recover and follow the instructions.

If you do not act within 24 hours, your account will be suspended.

Microsoft Account Security`,

  cfo: `From: "CFO Sarah Chen" <sarah.chen@ecloudvalley-corp.com>
Reply-To: sarah.chen@ecloudvalley-corp.com
To: accountant@ecloudvalley.com
Subject: Urgent - need your help right away
Authentication-Results: mx.google.com; spf=pass smtp.mailfrom=ecloudvalley-corp.com; dkim=pass; dmarc=pass

Hi,

I'm currently in a board meeting and cannot take calls.
I need you to purchase 5 x $200 Google Play gift cards urgently for a client gift.

Please buy them from the nearest store, scratch off the back to reveal the codes,
and reply to this email with the codes as soon as possible.

I'll reimburse you through payroll this week.
This is time-sensitive — please handle it immediately, do not discuss with anyone else.

Thanks,
Sarah Chen
CFO, eCloudvalley`,

  shortener: `From: "Dropbox" <no-reply@dropbox-notify.work>
Reply-To: no-reply@dropbox-notify.work
To: user@ecloudvalley.com
Subject: Someone shared a file with you on Dropbox

Hi there,

A colleague has shared a document with you via Dropbox.

Click the link below to view and download the file:

  https://bit.ly/3xDropboxShare2024

Please verify your account to access the shared folder.

This link will expire in 48 hours.

— The Dropbox Team`,

  benign: `From: "Alice Wang" <alice.wang@ecloudvalley.com>
Reply-To: alice.wang@ecloudvalley.com
Return-Path: <alice.wang@ecloudvalley.com>
To: bob.lin@ecloudvalley.com
Subject: Q3 project update - meeting notes attached
Date: Sun, 28 Jun 2026 09:30:00 +0800
Authentication-Results: mx.google.com; spf=pass smtp.mailfrom=ecloudvalley.com; dkim=pass header.d=ecloudvalley.com; dmarc=pass

Hi Bob,

Thanks for joining the sync yesterday. Here's a quick summary of what we covered:

1. The Q3 roadmap is on track — dev team confirmed the new module ships by July 15.
2. Marketing will prepare the launch materials by end of next week.
3. We'll schedule a final review meeting for July 10.

Please review the updated project tracker here:
https://drive.ecloudvalley.com/projects/q3-roadmap

Let me know if you have any questions. See you at the stand-up on Tuesday.

Best,
Alice`,

  spam: `From: "Best Offers Daily" <deals@bestoffers.xyz>
Reply-To: deals@bestoffers.xyz
To: user@ecloudvalley.com
Subject: Exclusive deals just for you this week

Hello,

Check out this week's top picks handpicked just for you:

- 50% off premium noise-cancelling headphones
- Buy 2 get 1 free on all coffee subscriptions
- Limited edition sneakers — while stocks last

Visit our website at https://bestoffers.xyz/weekly to see all deals.

To unsubscribe, reply with "STOP".

— Best Offers Team`
};

const $ = (id) => document.getElementById(id);

$("sampleSelect").onchange = () => {
  const key = $("sampleSelect").value;
  if (key && SAMPLES[key]) {
    $("email").value = SAMPLES[key];
    $("sampleSelect").value = "";
  }
};

$("checkBtn").onclick = analyze;

async function analyze() {
  const raw = $("email").value.trim();
  if (!raw) { $("email").focus(); return; }
  $("checkBtn").disabled = true;
  $("spinner").style.display = "block";
  try {
    const res = await fetch("/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ raw_email: raw }),
    });
    const data = await res.json();
    render(data);
  } catch (e) {
    alert("Request failed: " + e);
  } finally {
    $("checkBtn").disabled = false;
    $("spinner").style.display = "none";
  }
}

const LEVEL_MAP = {
  low:    { label: "✅ 可信",       color: "#1e8e3e" },
  medium: { label: "⚠️ 可疑",       color: "#f9ab00" },
  high:   { label: "🎣 一百趴釣魚", color: "#d93025" },
};

function render(d) {
  const color = COLORS[d.verdict_band] || COLORS.low;
  const level = LEVEL_MAP[d.verdict_band] || LEVEL_MAP.low;

  // provider pill
  const pmap = { mock: "Mock", gemini: "Gemini", groq: "Groq" };
  $("providerPill").textContent = pmap[d.provider] || d.provider;

  // level banner
  $("levelBanner").textContent = level.label;
  $("levelBanner").style.color = level.color;

  // gauge: conic ring up to final_score
  const deg = Math.round((d.final_score / 100) * 360);
  $("gauge").style.background =
    `conic-gradient(${color} ${deg}deg, #eceff1 ${deg}deg)`;
  $("score").textContent = d.final_score;
  $("score").style.color = color;

  // risk badge
  $("riskBadge").textContent = d.risk_type;
  $("riskBadge").style.background = color;

  $("summary").textContent = d.summary || "";

  // reasons
  const list = $("reasonList");
  list.innerHTML = "";
  (d.reasons || []).forEach((r) => {
    const row = document.createElement("div");
    row.className = "reason";
    row.innerHTML = `
      <div class="dot" style="background:${COLORS[r.severity] || "#9aa0a6"}"></div>
      <div class="txt">
        <div class="label">${escapeHtml(r.label)}</div>
        <div class="detail">${escapeHtml(r.detail)}</div>
      </div>
      <span class="src-tag src-${r.source}">${r.source}</span>`;
    list.appendChild(row);
  });

  // transparency footer
  let footer = `Engine: rule score <code>${d.rule_score}</code> · `
    + `LLM score <code>${d.llm_score}</code> · provider <code>${d.provider}</code>`;
  if (d.parse_warnings && d.parse_warnings.length) {
    footer += `<div class="warn">⚠ ${d.parse_warnings.map(escapeHtml).join("; ")}</div>`;
  }
  $("footer").innerHTML = footer;

  $("result").style.display = "block";
}

function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// Show which engine is active on load.
fetch("/health").then(r => r.json()).then(d => {
  const pmap = { mock: "Mock", gemini: "Gemini", groq: "Groq" };
  $("providerPill").textContent = pmap[d.provider] || d.provider;
}).catch(() => {});
</script>
</body>
</html>
